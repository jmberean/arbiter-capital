<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arbiter Capital — Audit Chain Verifier</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"
          crossorigin="anonymous"></script>
  <style>
    :root {
      --green: #22c55e;
      --red:   #ef4444;
      --yellow:#eab308;
      --bg:    #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text:  #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex; align-items: center; gap: 1rem;
    }
    header h1 { font-size: 1.1rem; }
    header .subtitle { color: var(--muted); font-size: 0.85rem; }

    #badge {
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      margin-left: auto;
      background: #1a2535;
      color: var(--muted);
    }
    #badge.ok  { background: #052e16; color: var(--green); border: 1px solid var(--green); }
    #badge.err { background: #2d0606; color: var(--red);   border: 1px solid var(--red);   }
    #badge.loading { background: #1c1a05; color: var(--yellow); border: 1px solid var(--yellow); }

    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

    #status-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    #status-bar span { color: var(--text); }

    #receipt-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .receipt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      font-size: 0.8rem;
    }
    .receipt-card.ok  { border-left: 3px solid var(--green); }
    .receipt-card.err { border-left: 3px solid var(--red);   }
    .receipt-card.attack { border-left: 3px solid var(--red); background: #1a0808; }

    .receipt-header {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .receipt-type {
      background: #0f172a; border: 1px solid var(--border);
      border-radius: 4px; padding: 0.15rem 0.5rem;
      font-size: 0.7rem; color: var(--yellow);
    }
    .receipt-id { color: var(--muted); }
    .receipt-hash-ok   { margin-left: auto; color: var(--green); }
    .receipt-hash-fail { margin-left: auto; color: var(--red);   }

    .receipt-body { color: var(--muted); line-height: 1.6; }
    .receipt-body .field { display: flex; gap: 0.5rem; }
    .receipt-body .label { color: var(--text); min-width: 120px; }
    .hash-val { font-size: 0.7rem; word-break: break-all; }

    .link { color: #60a5fa; text-decoration: none; }
    .link:hover { text-decoration: underline; }

    #reload-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 0.4rem 1rem;
      cursor: pointer; font-family: inherit; font-size: 0.85rem;
    }
    #reload-btn:hover { background: var(--border); }

    .error-msg { color: var(--red); padding: 1rem; text-align: center; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Arbiter Capital — Audit Chain Verifier</h1>
    <div class="subtitle">Tamper-evident 0G audit chain · Browser-side keccak256 integrity</div>
  </div>
  <button id="reload-btn" onclick="runVerification()">⟳ Refresh</button>
  <div id="badge" class="loading">⏳ Loading…</div>
</header>

<main>
  <div id="status-bar">
    Head: <span id="head-val">—</span> &nbsp;|&nbsp;
    Receipts walked: <span id="count-val">0</span> &nbsp;|&nbsp;
    Status: <span id="status-val">Initialising…</span>
  </div>
  <div id="receipt-list"></div>
</main>

<script>
const API_BASE = "";  // same-origin; set to "http://localhost:7777" when opening as file://

/* ── Keccak256 via ethers ────────────────────────────────────────────── */
function keccak256Json(obj) {
  const canonical = JSON.stringify(
    Object.fromEntries(Object.entries(obj).sort()),
    (_, v) => v,
    0  // no extra spaces
  );
  // ethers expects a hex string or Uint8Array
  const bytes = new TextEncoder().encode(canonical);
  return ethers.keccak256(bytes);
}

/* ── API helpers ─────────────────────────────────────────────────────── */
async function fetchHead() {
  const r = await fetch(`${API_BASE}/api/head`);
  if (!r.ok) throw new Error(`/api/head returned ${r.status}`);
  return (await r.json()).head;
}

async function fetchReceipt(hashOrId) {
  const encoded = encodeURIComponent(hashOrId);
  const r = await fetch(`${API_BASE}/api/receipt/${encoded}`);
  if (!r.ok) throw new Error(`/api/receipt/${hashOrId} returned ${r.status}`);
  return await r.json();
}

/* ── Integrity check ─────────────────────────────────────────────────── */
function integrityOk(receipt) {
  const stored = receipt.receipt_hash;
  if (!stored) return true;  // pre-v5 receipt
  const body = Object.fromEntries(Object.entries(receipt).filter(([k]) => k !== "receipt_hash"));
  const canonical = JSON.stringify(
    body,
    (key, value) => value,
    // must match Python's json.dumps(sort_keys=True, separators=(",",":"))
  );
  // Rebuild with sorted keys
  const sorted = sortKeysDeep(body);
  const text = JSON.stringify(sorted).replace(/\s/g, "");
  const bytes = new TextEncoder().encode(text);
  const computed = ethers.keccak256(bytes);
  return computed.toLowerCase() === stored.toLowerCase();
}

function sortKeysDeep(obj) {
  if (Array.isArray(obj)) return obj.map(sortKeysDeep);
  if (obj !== null && typeof obj === "object") {
    return Object.fromEntries(
      Object.keys(obj).sort().map(k => [k, sortKeysDeep(obj[k])])
    );
  }
  return obj;
}

/* ── Render helpers ──────────────────────────────────────────────────── */
function truncate(s, n=24) {
  if (!s) return "—";
  s = String(s);
  return s.length > n ? s.slice(0, n) + "…" : s;
}

function renderReceipt(receipt, hashId, ok) {
  const list = document.getElementById("receipt-list");
  const card = document.createElement("div");
  const rtype = receipt.receipt_type || "?";
  const isAttack = rtype === "AttackRejection";
  card.className = `receipt-card ${isAttack ? "attack" : (ok ? "ok" : "err")}`;

  const payload = receipt.payload || {};
  let details = "";

  if (rtype === "AttackRejection") {
    details = `
      <div class="field"><span class="label">attack_kind</span><span>${payload.attack_kind || "?"}</span></div>
      <div class="field"><span class="label">detected_by</span><span>${payload.detected_by || "?"}</span></div>
      <div class="field"><span class="label">detail</span><span>${payload.detail || "—"}</span></div>`;
  } else if (rtype === "ExecutionReceipt") {
    details = `
      <div class="field"><span class="label">tx_hash</span><span class="hash-val">${payload.tx_hash || "—"}</span></div>
      <div class="field"><span class="label">safe_nonce</span><span>${payload.safe_nonce ?? "—"}</span></div>`;
  } else if (rtype === "DecisionReceipt") {
    details = `
      <div class="field"><span class="label">proposal_id</span><span>${payload.proposal_id || "—"}</span></div>
      <div class="field"><span class="label">status</span><span>${payload.consensus_status || payload.status || "—"}</span></div>`;
  } else if (rtype === "LLMContext") {
    details = `
      <div class="field"><span class="label">model</span><span>${payload.model_id || "—"}</span></div>
      <div class="field"><span class="label">agent</span><span>${payload.invoking_agent || "—"}</span></div>`;
  }

  card.innerHTML = `
    <div class="receipt-header">
      <span class="receipt-type">${rtype}</span>
      <span class="receipt-id">${truncate(receipt.receipt_id, 12)}</span>
      <span class="${ok ? "receipt-hash-ok" : "receipt-hash-fail"}">${ok ? "✓ hash ok" : "✗ hash FAIL"}</span>
    </div>
    <div class="receipt-body">
      <div class="field"><span class="label">receipt_id</span><span class="hash-val">${receipt.receipt_id || "—"}</span></div>
      <div class="field"><span class="label">0g_ref</span><span class="hash-val">${truncate(hashId, 32)}</span></div>
      <div class="field"><span class="label">prev_hash</span><span class="hash-val">${truncate(receipt.prev_0g_tx_hash || "genesis", 32)}</span></div>
      ${details}
    </div>`;
  list.prepend(card);  // newest at top
}

/* ── Main verification loop ──────────────────────────────────────────── */
async function runVerification() {
  const badge   = document.getElementById("badge");
  const headEl  = document.getElementById("head-val");
  const countEl = document.getElementById("count-val");
  const statusEl= document.getElementById("status-val");
  const list    = document.getElementById("receipt-list");

  list.innerHTML = "";
  badge.className = "loading";
  badge.textContent = "⏳ Loading…";
  statusEl.textContent = "Fetching head…";

  let head;
  try {
    head = await fetchHead();
  } catch (e) {
    badge.className = "err";
    badge.textContent = "✗ FETCH ERROR";
    statusEl.textContent = e.message;
    list.innerHTML = `<div class="error-msg">Could not reach verifier API.<br/>Start the server: <code>python monitor/public_verifier/server.py</code></div>`;
    return;
  }

  if (!head) {
    badge.className = "loading";
    badge.textContent = "⚠ NO CHAIN";
    statusEl.textContent = "No audit chain head found. Run some proposals first.";
    return;
  }

  headEl.textContent = truncate(head, 32);
  let cur = head;
  let count = 0;
  let allOk = true;
  const MAX = 50;

  while (cur && count < MAX) {
    statusEl.textContent = `Walking… receipt #${count+1}`;
    let receipt;
    try {
      receipt = await fetchReceipt(cur);
    } catch (e) {
      badge.className = "err";
      badge.textContent = `✗ CHAIN BROKEN at #${count+1}`;
      statusEl.textContent = e.message;
      allOk = false;
      break;
    }

    const ok = integrityOk(receipt);
    if (!ok) allOk = false;
    renderReceipt(receipt, cur, ok);
    count++;
    countEl.textContent = count;

    cur = receipt.prev_0g_tx_hash || null;
  }

  if (allOk) {
    badge.className = "ok";
    badge.textContent = `✓ CHAIN VERIFIED — ${count} receipts`;
    statusEl.textContent = `All ${count} receipts passed integrity check.`;
  } else {
    badge.className = "err";
    badge.textContent = `✗ INTEGRITY FAIL`;
  }
}

window.addEventListener("DOMContentLoaded", runVerification);
</script>
</body>
</html>
